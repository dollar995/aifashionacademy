<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تسجيل الدخول | أكاديمية AI Fashion</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
<style>
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#070707 0%,#141414 50%,#070707 100%);padding:2rem;}
.login-box{background:rgba(20,20,20,.92);border:1px solid rgba(212,165,116,.35);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:440px;box-shadow:0 22px 60px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo-img{width:120px;height:auto;object-fit:contain;margin:0 auto 1rem;display:block;}
.login-logo h2{font-size:1.5rem;color:#faf9f6;margin-bottom:.5rem;font-weight:700;}
.login-logo p{color:#94a3b8;font-size:.9rem;}
.form-group{margin-bottom:1.25rem;}
.form-label{display:block;font-size:.85rem;font-weight:600;color:#d4a574;margin-bottom:.5rem;}
.form-input{width:100%;padding:.875rem 1rem;border:2px solid rgba(212,165,116,.2);border-radius:12px;font-family:Tajawal,sans-serif;font-size:1rem;color:#faf9f6;background:rgba(255,255,255,.05);box-sizing:border-box;transition:border-color .3s;}
.form-input:focus{outline:none;border-color:#d4a574;}
.form-input::placeholder{color:#64748b;}
.btn-login{width:100%;padding:1rem;background:linear-gradient(135deg,#d4a574,#b08d5f);color:#070707;border:none;border-radius:12px;font-family:Tajawal,sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .3s;}
.btn-login:hover{opacity:.9;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.login-footer{text-align:center;margin-top:1.5rem;font-size:.85rem;color:#64748b;}
.login-footer a{color:#d4a574;text-decoration:none;font-weight:600;}
.access-message{background:rgba(212,165,116,.08);border:1px solid rgba(212,165,116,.2);border-radius:12px;padding:1rem;margin-bottom:1.5rem;font-size:.85rem;color:#94a3b8;text-align:center;}
.access-message strong{color:#d4a574;}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem;font-size:.9rem;display:none;}
.success-msg{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem;font-size:.9rem;display:none;}
@media(max-width:520px){.login-box{padding:2rem 1.25rem;}}
</style>
</head>
<body>
<div class="login-page">
<div class="login-box">
  <div class="login-logo">
    <img alt="AI Fashion Academy" class="login-logo-img" src="assets/logo/logo.png"/>
    <h2>تسجيل الدخول</h2>
    <p>ادخل بحسابك للوصول الكامل إلى جميع محتوى الدورة.</p>
  </div>

  <div class="access-message">
    <strong>وصول كامل بعد الشراء</strong><br/>
    بعد شراء الدورة، ستصلك رسالة إيميل فيها رابط لضبط كلمة مرورك والدخول للمنصة.
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="form-group">
    <label class="form-label" for="email">البريد الإلكتروني</label>
    <input class="form-input" id="email" placeholder="your@email.com" required type="email"/>
  </div>
  <div class="form-group">
    <label class="form-label" for="password">كلمة المرور</label>
    <input class="form-input" id="password" placeholder="••••••••" required type="password"/>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>

  <div class="login-footer">
    <p>مش مسجل بعد؟ <a href="payment.html">اشترك بالكورس الآن</a></p>
    <p style="margin-top:.75rem;font-size:.75rem;color:#334155;">🔒 بياناتك محمية ومشفرة.</p>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://frlsurwwumzcqckwkmnv.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZybHN1cnd3dW16Y3Fja3drbW52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTIzMDAsImV4cCI6MjA5NDU4ODMwMH0.mnGsAdIgi5m2hAWMQvPHDuQXWs7JPvAjm9Zct73w8aE';
var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, storageKey: 'aifa-auth' }
});

// Check if already logged in
client.auth.getSession().then(function(res) {
  if (res.data.session) {
    var params = new URLSearchParams(location.search);
    var redirect = params.get('redirect');
    location.href = redirect || 'dashboard.html';
  }
});

function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');
  var errDiv = document.getElementById('errorMsg');
  var sucDiv = document.getElementById('successMsg');

  if (!email || !password) {
    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري الدخول...';
  errDiv.style.display = 'none';

  client.auth.signInWithPassword({ email: email, password: password })
    .then(function(res) {
      if (res.error) {
        showError('بيانات الدخول غير صحيحة. تحقق من إيميلك وكلمة المرور.');
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
        return;
      }
      sucDiv.textContent = 'تم الدخول بنجاح! جاري التحويل...';
      sucDiv.style.display = 'block';
      setTimeout(function() {
        var params = new URLSearchParams(location.search);
        var redirect = params.get('redirect');
        location.href = redirect || 'dashboard.html';
      }, 1000);
    });
}

function showError(msg) {
  var e = document.getElementById('errorMsg');
  e.textContent = msg;
  e.style.display = 'block';
}

// Allow Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
