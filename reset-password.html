<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>إعادة تعيين كلمة المرور | أكاديمية AI Fashion</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>
  :root {
    --blue:#00b4ff;
    --blue-dark:#0066ff;
    --blue-glow:rgba(0,180,255,0.3);
    --bg:#020810;
    --card-bg:rgba(3,12,35,0.92);
    --text:#faf9f6;
    --muted:#64748b;
    --danger:#f87171;
    --danger-soft:rgba(239,68,68,.08);
    --danger-border:rgba(239,68,68,.3);
  }

  * {
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body {
    font-family:Tajawal,sans-serif;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 20%,rgba(0,100,255,0.12) 0%,transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%,rgba(0,180,255,0.08) 0%,transparent 50%);
    min-height:100vh;
    color:var(--text);
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  nav {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1.25rem clamp(1rem,4vw,3rem);
    border-bottom:1px solid rgba(0,180,255,0.1);
    backdrop-filter:blur(10px);
    background:rgba(2,8,16,0.85);
    position:sticky;
    top:0;
    z-index:100;
  }

  .nav-logo {
    display:flex;
    align-items:center;
    gap:.6rem;
    text-decoration:none;
    color:var(--blue);
    font-weight:800;
    font-size:clamp(.85rem,2.4vw,1rem);
  }

  .logo-icon {
    width:34px;
    height:34px;
    flex-shrink:0;
    background:linear-gradient(135deg,var(--blue-dark),var(--blue));
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:.8rem;
    color:#fff;
    box-shadow:0 0 12px var(--blue-glow);
  }

  .login-page {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem clamp(1rem,4vw,2rem);
  }

  .login-box {
    background:var(--card-bg);
    border:1px solid rgba(0,180,255,0.15);
    border-radius:24px;
    padding:clamp(2rem,5vw,3rem) clamp(1.5rem,4vw,2.5rem);
    width:100%;
    max-width:460px;
    box-shadow:0 25px 60px rgba(0,0,0,.5);
    position:relative;
    overflow:hidden;
  }

  .login-box::before {
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:3px;
    background:linear-gradient(90deg,var(--blue-dark),var(--blue));
  }

  .login-logo {
    text-align:center;
    margin-bottom:2rem;
  }

  .login-logo-img {
    width:110px;
    margin:0 auto 1rem;
    display:block;
  }

  .login-logo h2 {
    font-size:1.5rem;
    color:#fff;
    font-weight:800;
    margin-bottom:.4rem;
  }

  .login-logo p {
    color:var(--muted);
    font-size:.9rem;
    line-height:1.8;
  }

  .form-group {
    margin-bottom:1.25rem;
  }

  .form-label {
    display:block;
    font-size:.85rem;
    font-weight:600;
    color:var(--blue);
    margin-bottom:.5rem;
  }

  .form-input {
    width:100%;
    padding:.875rem 1rem;
    border:1.5px solid rgba(0,180,255,0.2);
    border-radius:12px;
    font-family:Tajawal,sans-serif;
    font-size:1rem;
    color:#f1f5f9;
    background:rgba(255,255,255,0.04);
    transition:border-color .3s,box-shadow .3s;
  }

  .form-input:focus {
    outline:none;
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(0,180,255,0.12);
  }

  .form-input::placeholder {
    color:#475569;
  }

  .hint {
    font-size:.8rem;
    color:#64748b;
    margin-top:.4rem;
  }

  .btn-primary {
    width:100%;
    padding:1rem;
    background:linear-gradient(135deg,var(--blue-dark),var(--blue));
    color:#fff;
    border:none;
    border-radius:12px;
    font-family:Tajawal,sans-serif;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
    margin-top:.5rem;
    transition:opacity .3s,transform .2s;
    box-shadow:0 0 20px rgba(0,180,255,0.2);
  }

  .btn-primary:hover {
    opacity:.9;
    transform:translateY(-1px);
  }

  .btn-primary:disabled {
    opacity:.5;
    cursor:not-allowed;
    transform:none;
  }

  .error-msg {
    background:var(--danger-soft);
    border:1px solid var(--danger-border);
    color:#fca5a5;
    padding:.75rem 1rem;
    border-radius:10px;
    margin-bottom:1rem;
    font-size:.9rem;
    display:none;
    line-height:1.8;
  }

  .success-msg {
    background:rgba(0,180,255,.08);
    border:1px solid rgba(0,180,255,.3);
    color:#7dd3fc;
    padding:.75rem 1rem;
    border-radius:10px;
    margin-bottom:1rem;
    font-size:.9rem;
    display:none;
    line-height:1.8;
  }

  .expired-icon {
    font-size:3rem;
    margin-bottom:1rem;
  }

  .expired-title {
    color:var(--danger) !important;
  }

  .expired-link {
    display:inline-block;
    margin-top:1.5rem;
    padding:.85rem 2rem;
    background:linear-gradient(135deg,#0066ff,#00b4ff);
    color:#fff;
    border-radius:12px;
    font-weight:700;
    text-decoration:none;
  }

  @media(max-width:520px) {
    .login-box {
      padding:2rem 1.25rem;
    }
  }
</style>
</head>

<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="logo-icon">AI</div>
    AI Fashion Academy
  </a>
</nav>

<div class="login-page">
  <div class="login-box">

    <div class="login-logo">
      <img alt="AI Fashion Academy" class="login-logo-img" src="assets/logo/logo.png"/>
      <h2>إعادة تعيين كلمة المرور</h2>
      <p>اختر كلمة مرور جديدة لحسابك.</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div id="resetForm" style="display:none;">
      <div class="form-group">
        <label class="form-label" for="newPassword">كلمة المرور الجديدة</label>
        <input class="form-input" id="newPassword" placeholder="••••••••" type="password" autocomplete="new-password"/>
        <p class="hint">على الأقل 8 أحرف</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">تأكيد كلمة المرور</label>
        <input class="form-input" id="confirmPassword" placeholder="••••••••" type="password" autocomplete="new-password"/>
      </div>

      <button class="btn-primary" id="saveBtn" type="button">
        حفظ كلمة المرور الجديدة ←
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
var SUPABASE_URL = 'https://frlsurwwumzcqckwkmnv.supabase.co';

var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZybHN1cnd3dW16Y3Fja3drbW52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTIzMDAsImV4cCI6MjA5NDU4ODMwMH0.mnGsAdIgi5m2hAWMQvPHDuQXWs7JPvAjm9Zct73w8aE';

var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    storageKey: 'aifa-auth',
    autoRefreshToken: true,
    detectSessionInUrl: false
  }
});

function getHashParams() {
  var hash = window.location.hash.substring(1);
  var params = {};

  if (!hash) return params;

  hash.split('&').forEach(function(part) {
    var kv = part.split('=');

    if (kv[0]) {
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
    }
  });

  return params;
}

function getQueryParams() {
  var search = window.location.search.substring(1);
  var params = {};

  if (!search) return params;

  search.split('&').forEach(function(part) {
    var kv = part.split('=');

    if (kv[0]) {
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
    }
  });

  return params;
}

function showExpired() {
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';

  var box = document.querySelector('.login-logo');

  box.innerHTML =
    '<div class="expired-icon">⚠️</div>' +
    '<h2 class="expired-title">رابط غير صالح أو منتهي</h2>' +
    '<p>الرابط انتهت صلاحيته أو تم استخدامه من قبل.<br/>اطلب رابطاً جديداً من صفحة تسجيل الدخول.</p>' +
    '<a class="expired-link" href="login.html">← طلب رابط جديد</a>';
}

function showForm() {
  document.getElementById('resetForm').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';

  var cleanUrl = window.location.origin + window.location.pathname;
  history.replaceState(null, '', cleanUrl);
}

async function preparePasswordReset() {
  try {
    var hashParams = getHashParams();
    var queryParams = getQueryParams();

    var accessToken = hashParams.access_token;
    var refreshToken = hashParams.refresh_token;
    var hashType = hashParams.type;

    var code = queryParams.code;

    if (accessToken && refreshToken && hashType === 'recovery') {
      var sessionResult = await client.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });

      if (sessionResult.error || !sessionResult.data || !sessionResult.data.session) {
        showExpired();
        return;
      }

      showForm();
      return;
    }

    if (code) {
      var exchangeResult = await client.auth.exchangeCodeForSession(code);

      if (exchangeResult.error || !exchangeResult.data || !exchangeResult.data.session) {
        showExpired();
        return;
      }

      showForm();
      return;
    }

    var existingSession = await client.auth.getSession();

    if (existingSession.data && existingSession.data.session) {
      showForm();
      return;
    }

    showExpired();

  } catch (err) {
    showExpired();
  }
}

async function savePassword() {
  var newPass = document.getElementById('newPassword').value.trim();
  var confirmPass = document.getElementById('confirmPassword').value.trim();
  var btn = document.getElementById('saveBtn');

  hideMessages();

  if (!newPass || newPass.length < 8) {
    showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل.');
    return;
  }

  if (newPass !== confirmPass) {
    showError('كلمتا المرور غير متطابقتين.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري الحفظ...';

  try {
    var res = await client.auth.updateUser({
      password: newPass
    });

    if (res.error) {
      showError('حدث خطأ أثناء الحفظ. اطلب رابطاً جديداً ثم حاول مرة أخرى.');
      btn.disabled = false;
      btn.textContent = 'حفظ كلمة المرور الجديدة ←';
      return;
    }

    showSuccess('تم تعيين كلمة المرور بنجاح. جاري تحويلك للداشبورد...');

    setTimeout(function() {
      location.href = 'dashboard.html';
    }, 1800);

  } catch (err) {
    showError('حدث خطأ غير متوقع. اطلب رابطاً جديداً ثم حاول مرة أخرى.');
    btn.disabled = false;
    btn.textContent = 'حفظ كلمة المرور الجديدة ←';
  }
}

function hideMessages() {
  var e = document.getElementById('errorMsg');
  var s = document.getElementById('successMsg');

  e.style.display = 'none';
  e.textContent = '';

  s.style.display = 'none';
  s.textContent = '';
}

function showError(msg) {
  var e = document.getElementById('errorMsg');
  var s = document.getElementById('successMsg');

  e.textContent = msg;
  e.style.display = 'block';

  s.style.display = 'none';
  s.textContent = '';
}

function showSuccess(msg) {
  var s = document.getElementById('successMsg');
  var e = document.getElementById('errorMsg');

  s.textContent = msg;
  s.style.display = 'block';

  e.style.display = 'none';
  e.textContent = '';
}

document.getElementById('saveBtn').addEventListener('click', savePassword);

document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    savePassword();
  }
});

document.getElementById('newPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    savePassword();
  }
});

window.addEventListener('load', preparePasswordReset);
</script>

</body>
</html>
