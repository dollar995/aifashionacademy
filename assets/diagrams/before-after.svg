  <text x="600" y="385" font-family="Arial,sans-serif" font-size="22" fill="#C9A017" text-anchor="middle" opacity="0.6">→</text>
  <text x="600" y="405" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" text-anchor="middle" opacity="0.5">90 يوم</text>

