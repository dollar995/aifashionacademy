  <text x="60" y="440" font-family="Arial,sans-serif" font-size="10" fill="#C41010" font-weight="700">04 · المتجر</text>
  <text x="60" y="459" font-family="Arial,sans-serif" font-size="13" fill="#777">لا متجر ولا بنية تحتية للبيع</text>
  <text x="60" y="475" font-family="Arial,sans-serif" font-size="11" fill="#555">لا يعرف من أين يبدأ تقنياً</text>

  <rect x="660" y="420" width="500" height="62" rx="8" fill="url(#rightCard)" stroke="rgba(201,160,23,0.2)" stroke-width="1"/>
  <text x="680" y="440" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">04 · المتجر</text>
  <text x="680" y="459" font-family="Arial,sans-serif" font-size="13" fill="#e0e0e0">متجر Shopify + Printful يعمل</text>
  <text x="680" y="475" font-family="Arial,sans-serif" font-size="11" fill="#888">دفع + شحن + Automation تلقائية</text>
  <text x="1140" y="459" font-family="Arial,sans-serif" font-size="18" fill="#C9A017" text-anchor="end">🏪</text>

  <!-- Row 5 -->
  <rect x="40" y="494" width="500" height="62" rx="8" fill="url(#leftCard)" stroke="#222" stroke-width="1"/>
  <text x="60" y="514" font-family="Arial,sans-serif" font-size="10" fill="#C41010" font-weight="700">05 · المحتوى</text>
  <text x="60" y="533" font-family="Arial,sans-serif" font-size="13" fill="#777">لا محتوى ولا إعلانات ولا ميزانية</text>
  <text x="60" y="549" font-family="Arial,sans-serif" font-size="11" fill="#555">يعتقد أنه يحتاج مصور وفريق</text>

  <rect x="660" y="494" width="500" height="62" rx="8" fill="url(#rightCard)" stroke="rgba(201,160,23,0.2)" stroke-width="1"/>
  <text x="680" y="514" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">05 · المحتوى</text>
  <text x="680" y="533" font-family="Arial,sans-serif" font-size="13" fill="#e0e0e0">محتوى سينمائي بـ Runway + CapCut</text>
  <text x="680" y="549" font-family="Arial,sans-serif" font-size="11" fill="#888">إعلانات جاهزة بـ $15/شهر فقط</text>
  <text x="1140" y="533" font-family="Arial,sans-serif" font-size="18" fill="#C9A017" text-anchor="end">🎬</text>

  <!-- Row 6 — RESULT -->
  <rect x="40" y="572" width="500" height="62" rx="8" fill="#100808" stroke="#C41010" stroke-width="1" stroke-opacity="0.4"/>
  <text x="60" y="592" font-family="Arial,sans-serif" font-size="10" fill="#C41010" font-weight="700">06 · المبيعات</text>
  <text x="60" y="611" font-family="Arial,sans-serif" font-size="13" fill="#777">صفر مبيعات — لا أحد يعرفه</text>
  <text x="60" y="627" font-family="Arial,sans-serif" font-size="11" fill="#555">يتمنى لو بدأ أبكر</text>

  <rect x="660" y="572" width="500" height="62" rx="8" fill="rgba(201,160,23,0.08)" stroke="#C9A017" stroke-width="1.5"/>
  <text x="680" y="592" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">06 · المبيعات</text>
  <text x="680" y="611" font-family="Arial,sans-serif" font-size="13" fill="#E4B832" font-weight="700">أول مبيعة حقيقية 🎉</text>
  <text x="680" y="627" font-family="Arial,sans-serif" font-size="11" fill="#C9A017">براند ملابس يعمل على الإنترنت</text>
  <text x="1140" y="611" font-family="Arial,sans-serif" font-size="18" fill="#C9A017" text-anchor="end">💰</text>

  <!-- Cost comparison bar -->
  <rect x="40" y="650" width="1120" height="30" rx="6" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <text x="60" y="670" font-family="Arial,sans-serif" font-size="10" fill="#666">التكلفة قبل AI:</text>
  <text x="175" y="670" font-family="Arial,sans-serif" font-size="10" fill="#C41010" font-weight="700">$10,000+</text>
  <text x="300" y="670" font-family="Arial,sans-serif" font-size="10" fill="#666">→  بعد AI:</text>
  <text x="380" y="670" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">أقل من $150/شهر</text>
  <text x="600" y="670" font-family="Arial,sans-serif" font-size="10" fill="#666">المدة:</text>
  <text x="650" y="670" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">90 يوم</text>
  <text x="780" y="670" font-family="Arial,sans-serif" font-size="10" fill="#666">الضمان:</text>
  <text x="850" y="670" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">استرداد 7 أيام كامل</text>

  <!-- Footer -->
  <rect x="0" y="688" width="1200" height="12" fill="#050505"/>
</svg>
