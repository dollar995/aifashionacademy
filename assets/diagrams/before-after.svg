  <!-- Row 1 -->
  <rect x="40" y="198" width="500" height="62" rx="8" fill="url(#leftCard)" stroke="#222" stroke-width="1"/>
  <text x="60" y="218" font-family="Arial,sans-serif" font-size="10" fill="#C41010" font-weight="700">01 · الفكرة</text>
  <text x="60" y="237" font-family="Arial,sans-serif" font-size="13" fill="#777">أفكار مبعثرة في الذهن</text>
  <text x="60" y="253" font-family="Arial,sans-serif" font-size="11" fill="#555">بدون اتجاه واضح أو خطوة للأمام</text>

  <rect x="660" y="198" width="500" height="62" rx="8" fill="url(#rightCard)" stroke="rgba(201,160,23,0.2)" stroke-width="1"/>
  <text x="680" y="218" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">01 · الفكرة</text>
  <text x="680" y="237" font-family="Arial,sans-serif" font-size="13" fill="#e0e0e0">براند بنيش واضح ومحدد</text>
  <text x="680" y="253" font-family="Arial,sans-serif" font-size="11" fill="#888">خطة عمل 90 يوم قابلة للتنفيذ فوراً</text>
  <text x="1140" y="237" font-family="Arial,sans-serif" font-size="18" fill="#C9A017" text-anchor="end">🎯</text>

  <!-- Row 2 -->
  <rect x="40" y="272" width="500" height="62" rx="8" fill="url(#leftCard)" stroke="#222" stroke-width="1"/>
  <text x="60" y="292" font-family="Arial,sans-serif" font-size="10" fill="#C41010" font-weight="700">02 · التصميم</text>
  <text x="60" y="311" font-family="Arial,sans-serif" font-size="13" fill="#777">لا يعرف التصميم أو يملك خبرة</text>
  <text x="60" y="327" font-family="Arial,sans-serif" font-size="11" fill="#555">يحتاج مصمماً بـ $3,000-5,000</text>

  <rect x="660" y="272" width="500" height="62" rx="8" fill="url(#rightCard)" stroke="rgba(201,160,23,0.2)" stroke-width="1"/>
  <text x="680" y="292" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">02 · التصميم</text>
  <text x="680" y="311" font-family="Arial,sans-serif" font-size="13" fill="#e0e0e0">يصمم مجموعة كاملة بـ Midjourney</text>
  <text x="680" y="327" font-family="Arial,sans-serif" font-size="11" fill="#888">تكلفة $30/شهر بدلاً من $5,000</text>
  <text x="1140" y="311" font-family="Arial,sans-serif" font-size="18" fill="#C9A017" text-anchor="end">🎨</text>

