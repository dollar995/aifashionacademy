  <text x="910" y="171" font-family="Arial,sans-serif" font-size="13" fill="#C9A017" text-anchor="middle" font-weight="700">بعد الكورس — AFTER</text>
  <circle cx="688" cy="165" r="12" fill="rgba(201,160,23,0.15)" stroke="#C9A017" stroke-width="1"/>
  <text x="688" y="170" font-family="Arial,sans-serif" font-size="13" fill="#C9A017" text-anchor="middle">✓</text>

  <!-- CENTER ARROW -->
