  <text x="60" y="401" font-family="Arial,sans-serif" font-size="11" fill="#555">الفكرة تبقى في الرأس فقط</text>

  <rect x="660" y="346" width="500" height="62" rx="8" fill="url(#rightCard)" stroke="rgba(201,160,23,0.2)" stroke-width="1"/>
  <text x="680" y="366" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">03 · الهوية</text>
  <text x="680" y="385" font-family="Arial,sans-serif" font-size="13" fill="#e0e0e0">Brand Guidelines كاملة + لوغو</text>
  <text x="680" y="401" font-family="Arial,sans-serif" font-size="11" fill="#888">ألوان + خطوط + قصة + قيم موثّقة</text>
