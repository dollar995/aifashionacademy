<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070707"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E4B832"/>
      <stop offset="100%" style="stop-color:#C9A017"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f130a"/>
      <stop offset="100%" style="stop-color:#0a0f06"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- subtle grain -->
  <pattern id="grain" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="0.6" fill="#C9A017" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grain)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="58" fill="#060606"/>
  <rect x="0" y="57" width="1200" height="1" fill="#1e1e1e"/>
  <rect x="40" y="14" width="26" height="26" rx="5" fill="url(#gold)"/>
  <text x="53" y="31" font-family="Arial,sans-serif" font-size="11" font-weight="900" fill="#000" text-anchor="middle">AI</text>
  <text x="78" y="26" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fff">AI FASHION ACADEMY</text>
  <text x="78" y="41" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" letter-spacing="2">TRANSFORMATION MAP</text>
  <rect x="1000" y="18" width="160" height="22" rx="4" fill="none" stroke="#C9A017" stroke-width="1" opacity="0.35"/>
  <text x="1080" y="33" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" text-anchor="middle" font-weight="700">قبل وبعد الكورس</text>

  <!-- Title row -->
  <text x="600" y="96" font-family="Georgia,serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">رحلة التحول</text>
  <text x="600" y="118" font-family="Arial,sans-serif" font-size="12" fill="#666" text-anchor="middle">The 90-Day Transformation</text>
  <rect x="570" y="126" width="60" height="2" rx="1" fill="url(#gold)"/>

  <!-- BEFORE column header -->
  <rect x="40" y="145" width="500" height="40" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="290" y="171" font-family="Arial,sans-serif" font-size="13" fill="#666" text-anchor="middle" font-weight="700">قبل الكورس — BEFORE</text>
  <circle cx="68" cy="165" r="12" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="68" y="170" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">✗</text>

  <!-- AFTER column header -->
