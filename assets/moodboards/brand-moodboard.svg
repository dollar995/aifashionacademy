    <line x1="0" y1="200" x2="1200" y2="200" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="0" y1="700" x2="1200" y2="700" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="800" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="800" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="800" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="800" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="800" stroke="#C9A017" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="800" stroke="#C9A017" stroke-width="0.5"/>
