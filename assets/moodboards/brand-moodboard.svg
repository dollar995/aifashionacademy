  <text x="920" y="500" font-family="Arial,sans-serif" font-size="10" fill="#C9A017">+ Arabic Heritage Design</text>
  <text x="920" y="520" font-family="Arial,sans-serif" font-size="9" fill="#444">Premium startup meets ancient craft</text>

