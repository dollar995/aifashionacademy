  <rect x="40" y="560" width="3" height="100" rx="2 0 0 2" fill="url(#gold)"/>
  <text x="68" y="588" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" font-weight="700" letter-spacing="2">AI TOOL STACK</text>
