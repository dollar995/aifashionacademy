  <rect x="900" y="320" width="260" height="220" rx="12" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="920" y="350" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" font-weight="700" letter-spacing="2">VISUAL REFERENCES</text>
