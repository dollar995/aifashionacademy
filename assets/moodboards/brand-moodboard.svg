  <text x="955" y="398" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Dark</text>
  <text x="955" y="410" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Editorial</text>
  <rect x="1000" y="362" width="70" height="70" rx="6" fill="#C9A017" opacity="0.8"/>
  <text x="1035" y="398" font-family="Arial,sans-serif" font-size="7" fill="#000" text-anchor="middle">Gold</text>
  <text x="1035" y="410" font-family="Arial,sans-serif" font-size="7" fill="#000" text-anchor="middle">Luxury</text>
  <rect x="1080" y="362" width="60" height="70" rx="6" fill="#1a1a1a" stroke="#C41010" stroke-width="1"/>
  <text x="1110" y="398" font-family="Arial,sans-serif" font-size="7" fill="#C41010" text-anchor="middle">Red</text>
  <text x="1110" y="410" font-family="Arial,sans-serif" font-size="7" fill="#C41010" text-anchor="middle">Accent</text>
  <!-- Inspiration labels -->
