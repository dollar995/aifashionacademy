<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4B832"/>
      <stop offset="100%" style="stop-color:#C9A017"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A017;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C9A017;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C41010;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#C41010;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card1clip"><rect x="40" y="80" width="340" height="460" rx="12"/></clipPath>
    <clipPath id="card2clip"><rect x="400" y="80" width="220" height="220" rx="12"/></clipPath>
    <clipPath id="card3clip"><rect x="400" y="320" width="220" height="220" rx="12"/></clipPath>
    <clipPath id="card4clip"><rect x="640" y="80" width="240" height="320" rx="12"/></clipPath>
    <clipPath id="card5clip"><rect x="900" y="80" width="260" height="220" rx="12"/></clipPath>
    <clipPath id="card6clip"><rect x="640" y="420" width="520" height="120" rx="12"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
