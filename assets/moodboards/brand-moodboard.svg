  <rect x="400" y="320" width="220" height="220" rx="12" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="420" y="350" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" font-weight="700" letter-spacing="2">TYPOGRAPHY</text>
  <text x="420" y="385" font-family="Georgia,serif" font-size="28" font-weight="900" fill="#fff">BRAND</text>
  <text x="420" y="415" font-family="Georgia,serif" font-size="28" font-weight="900" fill="url(#gold)">STORY</text>
  <line x1="420" y1="425" x2="590" y2="425" stroke="#C9A017" stroke-width="1" opacity="0.3"/>
  <text x="420" y="445" font-family="Arial,sans-serif" font-size="11" fill="#888">Cairo Bold — Headings</text>
  <text x="420" y="460" font-family="Arial,sans-serif" font-size="9" fill="#666">Cairo Regular — Body text</text>
  <text x="420" y="478" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" letter-spacing="3">CAIRO CAPS — LABELS</text>
  <text x="420" y="498" font-family="Georgia,serif" font-size="18" fill="#444">براند</text>
  <text x="460" y="498" font-family="Arial,sans-serif" font-size="9" fill="#555"> — Arabic Display</text>
  <text x="420" y="522" font-family="Arial,sans-serif" font-size="8" fill="#444">AI FASHION ACADEMY © 2025</text>

