    <text x="428" y="613" fill="#fff" font-weight="700">Runway</text>
    <text x="428" y="627" fill="#666" font-size="8">Visual AI</text>

    <rect x="508" y="598" width="100" height="40" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
    <circle cx="528" cy="615" r="5" fill="#06b6d4"/>
    <text x="538" y="613" fill="#fff" font-weight="700">Kling AI</text>
    <text x="538" y="627" fill="#666" font-size="8">Fashion Film</text>

    <rect x="618" y="598" width="100" height="40" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
    <circle cx="638" cy="615" r="5" fill="#ec4899"/>
    <text x="648" y="613" fill="#fff" font-weight="700">Canva Pro</text>
