  <text x="503" y="252" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle">Red Accent</text>

  <rect x="536" y="212" width="50" height="50" rx="6" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <text x="561" y="252" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Border</text>

  <text x="420" y="288" font-family="Arial,sans-serif" font-size="9" fill="#888">Typography: Cairo ExtraBold</text>

