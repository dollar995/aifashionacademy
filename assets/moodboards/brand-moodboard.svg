  <text x="920" y="265" font-family="Arial,sans-serif" font-size="9" fill="#666">Where heritage meets technology</text>
  <text x="920" y="280" font-family="Arial,sans-serif" font-size="9" fill="#555">الأصالة تلتقي بالتقنية</text>

