    <rect x="728" y="598" width="100" height="40" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
    <circle cx="748" cy="615" r="5" fill="#22c55e"/>
    <text x="758" y="613" fill="#fff" font-weight="700">Shopify</text>
    <text x="758" y="627" fill="#666" font-size="8">Store Platform</text>

