  <rect x="660" y="285" width="60" height="35" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="690" y="307" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Fabric Grain</text>
  <rect x="728" y="285" width="60" height="35" rx="4" fill="#141414" stroke="#C9A017" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="758" y="307" font-family="Arial,sans-serif" font-size="7" fill="#C9A017" text-anchor="middle">Gold Thread</text>
  <rect x="796" y="285" width="60" height="35" rx="4" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
