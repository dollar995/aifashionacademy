  <text x="660" y="112" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" font-weight="700" letter-spacing="2">PATTERN LANGUAGE</text>
  <!-- Geometric Arabic-inspired pattern -->
  <g opacity="0.15" transform="translate(640,80)">
    <g fill="none" stroke="#C9A017" stroke-width="0.5">
      <!-- Repeating geometric motif -->
      <polygon points="80,60 100,40 120,60 100,80" />
      <polygon points="120,60 140,40 160,60 140,80" />
      <polygon points="160,60 180,40 200,60 180,80" />
      <polygon points="100,80 120,60 140,80 120,100" />
      <polygon points="140,80 160,60 180,80 160,100" />
      <polygon points="80,100 100,80 120,100 100,120" />
      <polygon points="120,100 140,80 160,100 140,120" />
      <polygon points="160,100 180,80 200,100 180,120" />
      <polygon points="100,120 120,100 140,120 120,140" />
      <polygon points="140,120 160,100 180,120 160,140" />
      <polygon points="80,140 100,120 120,140 100,160" />
      <polygon points="120,140 140,120 160,140 140,160" />
      <polygon points="160,140 180,120 200,140 180,160" />
      <polygon points="100,160 120,140 140,160 120,180" />
      <polygon points="140,160 160,140 180,160 160,180" />
