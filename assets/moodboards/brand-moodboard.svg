  <text x="920" y="175" font-family="Georgia,serif" font-size="20" fill="#C9A017" font-weight="900">AUTHENTIC.</text>
  <text x="920" y="202" font-family="Georgia,serif" font-size="20" fill="#444" font-weight="900">CULTURAL.</text>
  <text x="920" y="229" font-family="Georgia,serif" font-size="20" fill="#333" font-weight="900">INTELLIGENT.</text>
