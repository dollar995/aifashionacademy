  <text x="56" y="33" font-family="Georgia,serif" font-size="14" font-weight="900" fill="#000" text-anchor="middle">AI</text>
  <text x="82" y="28" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff">AI FASHION ACADEMY</text>
  <text x="82" y="42" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" letter-spacing="2">WHERE FASHION MEETS AI</text>
  <!-- Tag -->
  <rect x="1040" y="16" width="120" height="24" rx="4" fill="none" stroke="#C9A017" stroke-width="1" opacity="0.6"/>
  <text x="1100" y="33" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#C9A017" text-anchor="middle">BRAND MOODBOARD</text>

  <!-- CARD 1 — Large hero fashion visual -->
  <rect x="40" y="80" width="340" height="460" rx="12" fill="url(#cardGrad1)" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Fashion silhouette illustration -->
  <rect x="40" y="80" width="340" height="460" rx="12" fill="#0f0f0f"/>
  <!-- Abstract fashion figure -->
  <ellipse cx="210" cy="200" rx="45" ry="55" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="175" y="255" width="70" height="180" rx="5" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Hoodie details -->
  <path d="M175 270 Q210 260 245 270 L250 320 Q210 310 170 320 Z" fill="#1e1e1e"/>
  <line x1="210" y1="260" x2="210" y2="320" stroke="#C9A017" stroke-width="0.5" opacity="0.4"/>
  <!-- Gold accent line on clothing -->
  <rect x="185" y="280" width="50" height="2" rx="1" fill="url(#gold)" opacity="0.6"/>
  <!-- Arabic text on hoodie -->
  <text x="210" y="300" font-family="Arial,sans-serif" font-size="11" fill="#C9A017" text-anchor="middle" opacity="0.5">براند</text>
  <!-- Bottom label -->
  <rect x="40" y="480" width="340" height="60" rx="0 0 12 12" fill="#0a0a0a"/>
  <rect x="40" y="480" width="340" height="1" fill="#2a2a2a"/>
  <text x="60" y="503" font-family="Arial,sans-serif" font-size="10" fill="#C9A017" font-weight="700">HERO AESTHETIC</text>
  <text x="60" y="523" font-family="Arial,sans-serif" font-size="12" fill="#888">Dark Luxury Streetwear</text>
  <!-- Gold ambient on figure -->
  <circle cx="210" cy="300" r="120" fill="#C9A017" opacity="0.02"/>

  <!-- Color palette strip on card 1 -->
  <rect x="55" y="460" width="24" height="10" rx="2" fill="#080808"/>
  <rect x="83" y="460" width="24" height="10" rx="2" fill="#C9A017"/>
  <rect x="111" y="460" width="24" height="10" rx="2" fill="#1a1a1a"/>
  <rect x="139" y="460" width="24" height="10" rx="2" fill="#C41010"/>
  <rect x="167" y="460" width="24" height="10" rx="2" fill="#f0f0f0"/>

  <!-- CARD 2 — Color palette block -->
  <rect x="400" y="80" width="220" height="220" rx="12" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
  <text x="420" y="110" font-family="Arial,sans-serif" font-size="9" fill="#C9A017" font-weight="700" letter-spacing="2">COLOR PALETTE</text>
  <!-- Color swatches big -->
  <rect x="420" y="122" width="80" height="80" rx="8" fill="#080808" stroke="#333" stroke-width="1"/>
  <text x="460" y="168" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">#080808</text>
  <text x="460" y="178" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Abyss Black</text>

  <rect x="510" y="122" width="80" height="80" rx="8" fill="#C9A017"/>
  <text x="550" y="168" font-family="Arial,sans-serif" font-size="8" fill="#000" text-anchor="middle">#C9A017</text>
  <text x="550" y="178" font-family="Arial,sans-serif" font-size="7" fill="#000" text-anchor="middle">Sand Gold</text>

  <rect x="420" y="212" width="50" height="50" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="445" y="252" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Charcoal</text>

